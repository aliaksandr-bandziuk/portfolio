<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Веб-разработчик Александр Бандюк, фрилансер</title>
  <link rel="preconnect" href="https://fonts.gstatic.com">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap&subset=cyrillic" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="hero">
    <div class="container">
      <div class="hero-header">
        <img src="img\logo.svg" alt="Альт текст" class="logo">
        <div class="social-links">
          <a href="https://github.com/aliaksandr-bandziuk/" class="social-link"><img src="img\social\facebook.svg" alt="Github"></a>
          <a href="https://github.com/aliaksandr-bandziuk/" class="social-link"><img src="img\social\twitter.svg" alt="Twitter"></a>
          <a href="https://github.com/aliaksandr-bandziuk/" class="social-link"><img src="img\social\instagram.svg" alt="Instagram"></a>
          <a href="https://github.com/aliaksandr-bandziuk/" class="social-link"><img src="img\social\facebook.svg" alt="Facebook"></a>
        </div>
        <!-- /.social-links -->
      </div>
      <!-- /.hero-header -->
      <div class="hero-content">
        <div class="hero-text">
          <span class="hero-subtitle">Веб-разработчик</span>
          <h1 class="hero-title">Александр Бандюк</h1>
          <p class="hero-description">
            Разрабатываю сайты для малого и среднего бизнеса. У меня можно заказать дизайн и верстку небольшого сайта или интернет-магазина
          </p>
          <button class="button hero-button">Бесплатная коснультация</button>
        </div>
        <!-- /.hero-text -->
        <div class="hero-avatar"></div>
        <!-- /.hero-avatar -->
      </div>
      <!-- /.hero-content -->
    </div>
  </header>
</body>
</html>
